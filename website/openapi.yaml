openapi: 3.0.3
info:
  title: Agent Maturity Compass API
  description: |
    REST API for the Agent Maturity Compass (AMC) — score, govern, and assure AI agent deployments.
    Every endpoint requires a Bearer token unless noted otherwise.
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api
    description: Local AMC Studio instance

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: object
        error:
          type: string

    ScoreResult:
      type: object
      properties:
        runId:
          type: string
        agentId:
          type: string
        layerScores:
          type: array
          items:
            type: object
        trustLabel:
          type: string
        integrityIndex:
          type: number

    Incident:
      type: object
      properties:
        incidentId:
          type: string
        agentId:
          type: string
        severity:
          type: string
          enum: [INFO, WARN, CRITICAL]
        state:
          type: string
          enum: [OPEN, INVESTIGATING, RESOLVED]
        title:
          type: string
        createdTs:
          type: integer

    WorkOrder:
      type: object
      properties:
        workOrderId:
          type: string
        title:
          type: string
        riskTier:
          type: string
        mode:
          type: string

tags:
  - name: health
    description: Health and readiness checks
  - name: score
    description: Scoring, diagnostics, quickscore, and session-based assessment
  - name: fleet
    description: Fleet and agent management
  - name: governor
    description: Governor, oversight, and autonomy mode
  - name: compliance
    description: Compliance frameworks, policy packs, waivers, and regulatory scoring
  - name: evidence
    description: Evidence lifecycle — ingest, list, gaps, bundles, attestation
  - name: crypto
    description: Notary, certificates, Merkle transparency, receipts chain
  - name: drift
    description: Drift detection, freeze management, and alerts
  - name: enforce
    description: Policy firewall and action evaluation
  - name: export
    description: Export, badge generation, and attestation
  - name: canary
    description: Canary deployments — policy canary, micro-canary, policy-mode
  - name: ci
    description: CI/CD gate — init, steps, gate evaluation, policy signing
  - name: config
    description: Runtime config, logs, doctor, version, and status
  - name: gateway
    description: Gateway/LLM proxy — config, init, bind, sign, verify, providers
  - name: identity
    description: Identity, SCIM tokens, OIDC/SAML providers, group mapping
  - name: adapters
    description: Adapter management — init, verify, list, detect, configure
  - name: assurance
    description: Assurance packs — list, run, cert issue/verify, scheduler, waivers, false-positive tracking
  - name: benchmark
    description: Benchmark import/export and statistics
  - name: bom
    description: BOM generation, signing, verification, SBOM, and bundles
  - name: incidents
    description: Incident creation, listing, and state transitions
  - name: memory
    description: Memory maturity assessment, correction memory, lessons, advisories
  - name: metrics
    description: Metrics status, SLO, and failure-risk indices
  - name: security
    description: ATO detection, secret blinding, taint tracking, threat intel, injection detection, insider risk
  - name: shield
    description: Shield — skill scan, injection detection, input sanitization
  - name: vault
    description: Vault — secrets, DLP scan, key management, redaction, classification
  - name: tools
    description: ToolHub, guardrails, and plugin management
  - name: watch
    description: Watch/observability — guard, attest, safety test, explainability, oversight
  - name: workflow
    description: Work orders, execution tickets, and lifecycle management
  - name: sandbox
    description: Hardened Docker sandbox execution
  - name: product
    description: Batch processor and portal
  - name: passport
    description: Agent passport — public profile, verification, revocation
  - name: timeline
    description: Agent timeline data
  - name: agentTimeline
    description: Agent timeline events

paths:
  # ── Health ─────────────────────────────────────────────────────
  /v1/health:
    get:
      tags: [health]
      summary: Health check
      description: Returns service health, version, uptime, and database status.
      responses:
        '200':
          description: Health payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  version:
                    type: string
                  uptime:
                    type: number
                  dbStatus:
                    type: string

  # ── Score ──────────────────────────────────────────────────────
  /v1/score/status:
    get:
      tags: [score]
      summary: Score module status
      responses:
        '200':
          description: Status and active session count

  /v1/score/run:
    post:
      tags: [score]
      summary: Run full diagnostic
      description: Trigger a full diagnostic run (CLI equivalent of `amc run`).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agentId:
                  type: string
                window:
                  type: string
                  default: '14d'
                targetName:
                  type: string
                claimMode:
                  type: string
                  enum: [auto, owner, harness]
      responses:
        '200':
          description: Diagnostic result with layer scores

  /v1/score/quickscore:
    post:
      tags: [score]
      summary: Rapid 5-question quickscore
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: object
                  additionalProperties:
                    type: integer
      responses:
        '200':
          description: Quickscore result

  /v1/score/quickscore/questions:
    get:
      tags: [score]
      summary: Get rapid quickscore questions
      responses:
        '200':
          description: List of 5 rapid questions

  /v1/score/quick:
    post:
      tags: [score]
      summary: Tiered quick score
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: object
                  additionalProperties:
                    type: integer
                tier:
                  type: string
                  enum: [quick, standard, deep]
      responses:
        '200':
          description: Quick score result

  /v1/score/quick/questions:
    get:
      tags: [score]
      summary: Get questions for a tier
      parameters:
        - name: tier
          in: query
          schema:
            type: string
            enum: [quick, standard, deep]
      responses:
        '200':
          description: Questions for tier

  /v1/score/latest:
    get:
      tags: [score]
      summary: Get latest run report
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Latest run report

  /v1/score/history:
    get:
      tags: [score]
      summary: List run history from ledger
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Run history

  /v1/score/compare:
    get:
      tags: [score]
      summary: Compare two runs (GET)
      parameters:
        - name: runA
          in: query
          required: true
          schema:
            type: string
        - name: runB
          in: query
          required: true
          schema:
            type: string
        - name: agentId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Comparison result
    post:
      tags: [score]
      summary: Compare two runs (POST)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [runA, runB]
              properties:
                runA:
                  type: string
                runB:
                  type: string
                agentId:
                  type: string
      responses:
        '200':
          description: Comparison result

  /v1/score/formal-spec:
    post:
      tags: [score]
      summary: Full formal-spec diagnostic score
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agentId:
                  type: string
                window:
                  type: string
      responses:
        '200':
          description: Full diagnostic result

  /v1/score/adversarial:
    post:
      tags: [score]
      summary: Test gaming resistance
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agentId:
                  type: string
      responses:
        '200':
          description: Adversarial test result

  /v1/score/runs:
    get:
      tags: [score]
      summary: List all runs for agent
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Run ID list

  /v1/score/run/{runId}:
    get:
      tags: [score]
      summary: Get specific run report
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: agentId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Run report

  /v1/score/report/{runId}:
    get:
      tags: [score]
      summary: Generate report for a run
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: agentId
          in: query
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [json, md]
      responses:
        '200':
          description: Report (JSON or Markdown)

  /v1/score/report:
    get:
      tags: [score]
      summary: Generate report (query param)
      parameters:
        - name: runId
          in: query
          required: true
          schema:
            type: string
        - name: agentId
          in: query
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [json, md]
      responses:
        '200':
          description: Report

  /v1/score/session:
    post:
      tags: [score]
      summary: Create interactive scoring session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [agentId]
              properties:
                agentId:
                  type: string
      responses:
        '201':
          description: Session created

  /v1/score/question/{sessionId}:
    get:
      tags: [score]
      summary: Get next question for session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Next question or completion status

  /v1/score/answer:
    post:
      tags: [score]
      summary: Record answer for session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, questionId, value]
              properties:
                sessionId:
                  type: string
                questionId:
                  type: string
                value:
                  type: integer
                notes:
                  type: string
      responses:
        '200':
          description: Answer recorded

  /v1/score/result/{sessionId}:
    get:
      tags: [score]
      summary: Get session result
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session score result

  # ── Fleet ──────────────────────────────────────────────────────
  /v1/fleet/health:
    get:
      tags: [fleet]
      summary: Fleet health dashboard
      responses:
        '200':
          description: Fleet health overview

  /v1/fleet/agents:
    get:
      tags: [fleet]
      summary: List all agents
      responses:
        '200':
          description: Agent list
    post:
      tags: [fleet]
      summary: Add agent
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [agentId]
              properties:
                agentId:
                  type: string
                agentName:
                  type: string
                role:
                  type: string
                domain:
                  type: string
                templateId:
                  type: string
                riskTier:
                  type: string
                  enum: [low, med, high, critical]
      responses:
        '201':
          description: Agent created

  /v1/fleet/agents/{agentId}:
    get:
      tags: [fleet]
      summary: Get agent config
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent configuration
    delete:
      tags: [fleet]
      summary: Remove agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent removed

  /v1/fleet/report:
    get:
      tags: [fleet]
      summary: Fleet maturity report
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, md]
        - name: window
          in: query
          schema:
            type: string
            default: '30d'
      responses:
        '200':
          description: Fleet report

  /v1/fleet/init:
    post:
      tags: [fleet]
      summary: Initialize fleet
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                org:
                  type: string
      responses:
        '200':
          description: Fleet initialized

  /v1/fleet/config:
    get:
      tags: [fleet]
      summary: Fleet configuration
      responses:
        '200':
          description: Fleet config

  /v1/fleet/freeze/status:
    get:
      tags: [fleet]
      summary: Execution freeze status
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Freeze status

  /v1/fleet/freeze/lift:
    post:
      tags: [fleet]
      summary: Lift execution freeze
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [agentId, incidentId, reason]
              properties:
                agentId:
                  type: string
                incidentId:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: Freeze lifted

  # ── Governor ───────────────────────────────────────────────────
  /v1/governor/check:
    post:
      tags: [governor]
      summary: Evaluate action permission
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [action, risk, mode]
              properties:
                action:
                  type: string
                risk:
                  type: string
                mode:
                  type: string
                agentId:
                  type: string
      responses:
        '200':
          description: Governor decision

  /v1/governor/explain:
    post:
      tags: [governor]
      summary: Explain policy for action class
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                agentId:
                  type: string
      responses:
        '200':
          description: Explanation

  /v1/governor/report:
    get:
      tags: [governor]
      summary: Governor matrix report
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [json, md]
      responses:
        '200':
          description: Governor report

  /v1/governor/policy/init:
    post:
      tags: [governor]
      summary: Initialize action policy
      responses:
        '200':
          description: Policy initialized

  /v1/governor/policy/verify:
    post:
      tags: [governor]
      summary: Verify action policy signature
      responses:
        '200':
          description: Verification result

  /v1/oversight/assess:
    get:
      tags: [governor]
      summary: Assess human oversight quality
      parameters:
        - name: agentId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Oversight assessment

  /v1/mode:
    get:
      tags: [governor]
      summary: Get current mode
      responses:
        '200':
          description: Current mode (owner/agent)
    put:
      tags: [governor]
      summary: Set mode
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [owner, agent]
      responses:
        '200':
          description: Mode set

  # ── Compliance ─────────────────────────────────────────────────
  /v1/compliance/init:
    post:
      tags: [compliance]
      summary: Create and sign compliance maps
      responses:
        '201':
          description: Compliance maps initialized

  /v1/compliance/verify:
    get:
      tags: [compliance]
      summary: Verify compliance maps signature
      responses:
        '200':
          description: Verification result

  /v1/compliance/report:
    post:
      tags: [compliance]
      summary: Generate evidence-linked compliance report
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [framework, window, outFile]
              properties:
                framework:
                  type: string
                window:
                  type: string
                outFile:
                  type: string
                format:
                  type: string
                agentId:
                  type: string
      responses:
        '201':
          description: Report generated

  /v1/compliance/fleet:
    post:
      tags: [compliance]
      summary: Fleet compliance summary
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [framework, window]
              properties:
                framework:
                  type: string
                window:
                  type: string
      responses:
        '200':
          description: Fleet compliance report

  /v1/compliance/diff:
    post:
      tags: [compliance]
      summary: Diff two compliance report JSON files
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [reportA, reportB]
              properties:
                reportA:
                  type: string
                reportB:
                  type: string
      responses:
        '200':
          description: Diff result

  /v1/policy/action/init:
    post:
      tags: [compliance]
      summary: Create and sign action policy
      responses:
        '201':
          description: Action policy created

  /v1/policy/action/verify:
    get:
      tags: [compliance]
      summary: Verify action policy signature
      responses:
        '200':
          description: Verification result

  /v1/policy/approval/init:
    post:
      tags: [compliance]
      summary: Create and sign approval policy
      responses:
        '201':
          description: Approval policy created

  /v1/policy/approval/verify:
    get:
      tags: [compliance]
      summary: Verify approval policy signature
      responses:
        '200':
          description: Verification result

  /v1/policy/pack/list:
    get:
      tags: [compliance]
      summary: List built-in policy packs
      responses:
        '200':
          description: Policy pack list

  /v1/policy/pack/describe/{packId}:
    get:
      tags: [compliance]
      summary: Describe a policy pack
      parameters:
        - name: packId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Policy pack details

  /v1/policy/pack/diff:
    post:
      tags: [compliance]
      summary: Show diff for applying a policy pack
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [packId]
              properties:
                packId:
                  type: string
                agentId:
                  type: string
      responses:
        '200':
          description: Diff result

  /v1/policy/pack/apply:
    post:
      tags: [compliance]
      summary: Apply policy pack
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [packId]
              properties:
                packId:
                  type: string
                agentId:
                  type: string
      responses:
        '200':
          description: Policy pack applied

  /v1/policy/debt/add:
    post:
      tags: [compliance]
      summary: Register policy debt
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [requirement, justification, expires]
              properties:
                agentId:
                  type: string
                requirement:
                  type: string
                justification:
                  type: string
                expires:
                  type: string
                createdBy:
                  type: string
      responses:
        '201':
          description: Policy debt registered

  /v1/policy/debt/list:
    get:
      tags: [compliance]
      summary: List active policy debt
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: all
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Active and expired policy debt

  /v1/policy/ops/init:
    post:
      tags: [compliance]
      summary: Create and sign ops policy
      responses:
        '201':
          description: Ops policy created

  /v1/policy/ops/verify:
    get:
      tags: [compliance]
      summary: Verify ops policy signature
      responses:
        '200':
          description: Verification result

  /v1/policy/ops/print:
    get:
      tags: [compliance]
      summary: Print effective ops policy
      responses:
        '200':
          description: Ops policy

  /v1/waiver/request:
    post:
      tags: [compliance]
      summary: Request time-limited readiness waiver
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [hours, reason]
              properties:
                hours:
                  type: integer
                reason:
                  type: string
                agentId:
                  type: string
      responses:
        '201':
          description: Waiver granted

  /v1/waiver/status:
    get:
      tags: [compliance]
      summary: Show waiver status
      responses:
        '200':
          description: Waiver status

  /v1/waiver/revoke:
    post:
      tags: [compliance]
      summary: Revoke active waiver
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                waiverId:
                  type: string
      responses:
        '200':
          description: Waiver revoked

  /v1/regulatory/eu-ai-act:
    get:
      tags: [compliance]
      summary: Score EU AI Act compliance
      responses:
        '200':
          description: EU AI Act score

  /v1/regulatory/owasp-llm:
    get:
      tags: [compliance]
      summary: Score OWASP LLM Top 10 coverage
      responses:
        '200':
          description: OWASP LLM score

  /v1/regulatory/readiness:
    get:
      tags: [compliance]
      summary: Weighted regulatory readiness score
      parameters:
        - name: agentId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Regulatory readiness result

  # ── Evidence ───────────────────────────────────────────────────
  /v1/evidence/status:
    get:
      tags: [evidence]
      summary: Evidence module status
      responses:
        '200':
          description: Status

  /v1/evidence/list:
    get:
      tags: [evidence]
      summary: List evidence files for agent
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Evidence file list

  /v1/evidence/gaps:
    get:
      tags: [evidence]
      summary: Evidence gaps for agent
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: runId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Evidence gaps

  /v1/evidence/ingest:
    post:
      tags: [evidence]
      summary: Ingest evidence from content string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [type, content]
              properties:
                agentId:
                  type: string
                type:
                  type: string
                content:
                  type: string
                filename:
                  type: string
      responses:
        '201':
          description: Evidence ingested

  /v1/evidence/collect:
    post:
      tags: [evidence]
      summary: Collect evidence from a path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [inputPath, type]
              properties:
                agentId:
                  type: string
                inputPath:
                  type: string
                type:
                  type: string
      responses:
        '201':
          description: Evidence collected

  /v1/evidence/export:
    get:
      tags: [evidence]
      summary: Export evidence bundle
