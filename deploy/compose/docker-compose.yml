# AMC Full Stack — Docker Compose
#
# Usage:
#   docker compose up
#   Open http://localhost:3212 for Studio
#
# Services:
#   - studio: AMC Studio dashboard + API (port 3212)
#   - gateway: AMC Gateway proxy (port 3210)

services:
  studio:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    ports:
      - "3212:3212"
      - "3210:3210"
    volumes:
      - amc-data:/root/.amc
    environment:
      - AMC_STUDIO_PORT=3212
      - AMC_GATEWAY_PORT=3210
      - NODE_ENV=production
    command: ["node", "dist/cli.js", "up", "--non-interactive"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3212/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  amc-data:
