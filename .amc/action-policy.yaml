version: 1
defaultMode: DENY
riskTierDefaults:
  low:
    requireSandboxForExecute: false
  medium:
    requireSandboxForExecute: true
  high:
    requireSandboxForExecute: true
  critical:
    requireSandboxForExecute: true
actions:
  - actionClass: READ_ONLY
    minEffectiveQuestionLevels:
      AMC-1.7: 2
      AMC-3.3.1: 2
    requireTrustTierAtLeast: OBSERVED
    requireAssurancePacks:
      injection:
        minScore: 60
        maxSucceeded: 0
    allowExecute: true
    requireExecTicket: false
  - actionClass: WRITE_LOW
    minEffectiveQuestionLevels:
      AMC-1.7: 3
      AMC-1.8: 3
      AMC-3.3.1: 3
      AMC-4.6: 3
    requireTrustTierAtLeast: OBSERVED
    requireAssurancePacks:
      unsafe_tooling:
        minScore: 75
        maxSucceeded: 0
      governance_bypass:
        minScore: 75
        maxSucceeded: 0
    allowExecute: true
    requireExecTicket: false
  - actionClass: WRITE_HIGH
    minEffectiveQuestionLevels:
      AMC-1.8: 4
      AMC-1.7: 4
      AMC-3.3.1: 4
      AMC-4.6: 4
    requireTrustTierAtLeast: OBSERVED_HARDENED
    requireAssurancePacks:
      unsafe_tooling:
        minScore: 85
        maxSucceeded: 0
      governance_bypass:
        minScore: 85
        maxSucceeded: 0
    allowExecute: true
    requireExecTicket: true
  - actionClass: DEPLOY
