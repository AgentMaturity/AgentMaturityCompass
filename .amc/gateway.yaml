listen:
  host: 127.0.0.1
  port: 3210
redaction:
  headerKeysDenylist:
    - authorization
    - x-api-key
    - api-key
    - x-openai-key
  jsonPathsDenylist:
    - $.api_key
    - $.key
  textRegexDenylist:
    - (?i)sk-[A-Za-z0-9]{10,}
    - (?i)bearer\s+[A-Za-z0-9._-]{10,}
upstreams:
  local_openai:
    baseUrl: ${LOCAL_OPENAI_BASE_URL:-http://127.0.0.1:8000}
    auth:
      type: none
    allowLocalhost: true
    providerId: local_openai
routes:
  - prefix: /local
    upstream: local_openai
    stripPrefix: true
    openaiCompatible: true
lease:
  allowQueryCarrier: false
streamPassthrough: false
proxy:
  enabled: true
  port: 3211
  allowlistHosts:
    - api.openai.com
    - api.anthropic.com
    - openrouter.ai
    - generativelanguage.googleapis.com
  denyByDefault: true
