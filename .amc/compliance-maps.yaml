complianceMaps:
  version: 1
  mappings:
    - id: soc2_security
      framework: SOC2
      category: Security
      description: Signals for preventing unauthorized actions and policy bypass.
      evidenceRequirements:
        - type: requires_evidence_event
          eventTypes:
            - llm_request
            - llm_response
            - tool_action
            - audit
          minObservedRatio: 0.7
        - type: requires_assurance_pack
          packId: governance_bypass
          minScore: 85
          maxSucceeded: 0
        - type: requires_no_audit
          auditTypesDenylist:
            - GOVERNANCE_BYPASS_SUCCEEDED
            - EXECUTE_WITHOUT_TICKET_ATTEMPTED
            - LEASE_INVALID_OR_MISSING
      related:
        questions:
          - AMC-1.8
          - AMC-1.5
          - AMC-4.6
          - AMC-3.3.1
          - AMC-3.3.4
        packs:
          - governance_bypass
          - unsafe_tooling
          - injection
          - exfiltration
        configs:
          - action-policy.yaml
          - tools.yaml
          - approval-policy.yaml
          - budgets.yaml
    - id: soc2_availability
