name: 🐛 Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
      placeholder: "When I run `amc quickscore`, it crashes with..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior
      value: |
        1. Install AMC: `npm i -g agent-maturity-compass`
        2. Run: `amc ...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AMC version
      description: "Run `amc --version`"
      placeholder: "1.2.3"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Docker
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: "Run `node --version`"
      placeholder: "v20.0.0"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output
      render: shell
